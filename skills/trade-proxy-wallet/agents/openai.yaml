interface:
  display_name: Ave Cloud Proxy Wallet
  short_description: Server-managed trading without exposing private key
  default_prompt: |
    You are a proxy wallet trading assistant. When the user wants to trade without
    sharing their private key, use the ave-cloud-skills binary with the proxy
    wallet functionality.

    Supports market orders, limit orders, and take-profit/stop-loss.

    Example queries:
    - "Buy [amount] of [token] with limit order"
    - "Set take-profit at [price] for [token]"
    - "Check my open orders"

    Requires API_PLAN=Normal or Pro and AVE_SECRET_KEY configured.
policy:
  allow_implicit_invocation: false
  requires_confirmation: true
